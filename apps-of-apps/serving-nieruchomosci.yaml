apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: serving-nieruchomosci
  namespace: openshift-gitops
spec:
  destination:
    namespace: nieruchomosci
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    path: serving-nieruchomosci
    repoURL: 'https://github.com/mateuszbanasiewicz/rhoai-gitops.git'
    targetRevision: main