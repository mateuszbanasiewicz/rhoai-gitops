apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bielik-chat
  namespace: openshift-gitops
spec:
  destination:
    namespace: bielik
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    path: bielik/chat
    repoURL: 'https://github.com/mateuszbanasiewicz/rhoai-gitops.git'
    targetRevision: main