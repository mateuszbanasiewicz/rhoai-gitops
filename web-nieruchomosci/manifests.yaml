---
apiVersion: v1
kind: Secret
metadata:
  name: nieruchomosci-scaler
  namespace: demo
type: Opaque
data:
  scaler.joblib: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nieruchomosci-app
  namespace: demo
  labels:
    app: nieruchomosci-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nieruchomosci-app
  template:
    metadata:
      labels:
        app: nieruchomosci-app
    spec:
      containers:
        - name: app
          image: internal-quay-quay.apps.ocpai.lab.cloudware.pl/rhoai/nieruchomosci-web:1.0.0
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_NAME
              value: "test333-v1"
            - name: MODEL_URL
              value: "http://test333-v1-predictor.aaa.svc.cluster.local"
            - name: SCALER_PATH
              value: "/app/scaler.joblib"
          volumeMounts:
            - name: scaler-volume
              mountPath: /app/scaler.joblib
              subPath: scaler.joblib
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: scaler-volume
          secret:
            secretName: nieruchomosci-scaler

---
apiVersion: v1
kind: Service
metadata:
  name: nieruchomosci-app
  namespace: demo
spec:
  selector:
    app: nieruchomosci-app
  ports:
    - port: 80
      targetPort: 8000

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: nieruchomosci-app
  namespace: demo
spec:
  to:
    kind: Service
    name: nieruchomosci-app
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect