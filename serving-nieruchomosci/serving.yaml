apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    opendatahub.io/connection-path: models/
    opendatahub.io/connections: nieruchomosci
    opendatahub.io/hardware-profile-name: cpu-only
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/hardware-profile-resource-version: "6407500"
    opendatahub.io/model-type: predictive
    openshift.io/description: ""
    openshift.io/display-name: nieruchomosci
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
  labels:
    modelregistry.opendatahub.io/model-version-id: "6"
    modelregistry.opendatahub.io/name: private-model-registry
    modelregistry.opendatahub.io/registered-model-id: "5"
    networking.kserve.io/visibility: exposed
    opendatahub.io/dashboard: "true"
  name: nieruchomosci
  namespace: demo
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: RollingUpdate
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: onnx
        version: "1"
      name: ""
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 4Gi
      runtime: nieruchomosci
      storage:
        key: nieruchomosci
        path: models/
    serviceAccountName: nieruchomosci-sa
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/runtime-version: v2025.4
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: OpenVINO Model Server
    opendatahub.io/template-name: kserve-ovms
    openshift.io/display-name: OpenVINO Model Server
  labels:
    opendatahub.io/dashboard: "true"
  name: nieruchomosci
  namespace: demo
spec:
  annotations:
    opendatahub.io/kserve-runtime: ovms
    prometheus.io/path: /metrics
    prometheus.io/port: "8888"
  containers:
  - args:
    - --model_name={{.Name}}
    - --port=8001
    - --rest_port=8888
    - --model_path=/mnt/models
    - --file_system_poll_wait_seconds=0
    - --metrics_enable
    image: registry.redhat.io/rhoai/odh-openvino-model-server-rhel9@sha256:defd01ac5a37a6138de73a8f1b10c676a2efa617238049378f8bc63fb0eb00c6
    name: kserve-container
    ports:
    - containerPort: 8888
      protocol: TCP
  multiModel: false
  protocolVersions:
  - v2
  - grpc-v2
  supportedModelFormats:
  - autoSelect: true
    name: openvino_ir
    version: opset13
  - name: onnx
    version: "1"
  - autoSelect: true
    name: tensorflow
    version: "1"
  - autoSelect: true
    name: tensorflow
    version: "2"
  - autoSelect: true
    name: paddle
    version: "2"
  - autoSelect: true
    name: pytorch
    version: "2"