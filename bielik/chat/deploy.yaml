apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: bielik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
        env:
        - name: WEBUI_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: openwebui-secrets
              key: WEBUI_SECRET_KEY

        - name: WEBUI_ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: openwebui-secrets
              key: WEBUI_ADMIN_EMAIL

        - name: WEBUI_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: openwebui-secrets
              key: WEBUI_ADMIN_PASSWORD

        - name: ENABLE_SIGNUP
          value: "false"

        # Twój model Granite / vLLM
        - name: REQUESTS_VERIFY
          value: "False"
        - name: AIOHTTP_CLIENT_SESSION_SSL
          value: "False"
        - name: AIOHTTP_CLIENT_SESSION_TOOL_SERVER_SSL
          value: "False"
        - name: OPENAI_API_BASE_URL
          value: "http://bielik-v30-predictor.bielik.svc.cluster.local/v1"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openwebui-secrets
              key: OPENAI_API_KEY

        # RAG / Qdrant
        - name: VECTOR_DB
          value: "qdrant"
        - name: QDRANT_URI
          value: "http://qdrant.qdrant.svc.cluster.local:6333"
        - name: QDRANT_API_KEY
          valueFrom:
            secretKeyRef:
              name: openwebui-secrets
              key: QDRANT_API_KEY
        - name: ENABLE_QDRANT_MULTITENANCY_MODE
          value: "true"
        - name: QDRANT_COLLECTION_PREFIX
          value: "open-webui"

        # Embeddingi dla RAG przez OpenAI-compatible endpoint
        - name: RAG_EMBEDDING_ENGINE
          value: "openai"
        - name: RAG_OPENAI_API_BASE_URL
          value: "https://<twoj-route-embeddingow>/v1"
        - name: RAG_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openwebui-secrets
              key: OPENAI_API_KEY
        - name: DATA_DIR
          value: /app/backend/data

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080

        volumeMounts:
        - name: webui-data
          mountPath: /app/backend/data
      volumes:
      - name: webui-data
        persistentVolumeClaim:
          claimName: open-webui-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi