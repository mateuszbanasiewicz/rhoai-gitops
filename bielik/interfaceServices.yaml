apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    security.opendatahub.io/enable-auth: 'false'
    opendatahub.io/hardware-profile-resource-version: '777619'
    openshift.io/description: ''
    openshift.io/display-name: bielik - v3.0
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/hardware-profile-name: default-profile
    opendatahub.io/connection-path: huggingface/speakleash/Bielik-11B-v3.0-Instruct/
    opendatahub.io/connections: bielik
    opendatahub.io/model-type: generative
  name: bielik-v30
  namespace: bielik
  labels:
    modelregistry.opendatahub.io/model-version-id: '2'
    modelregistry.opendatahub.io/name: private-model-registry
    modelregistry.opendatahub.io/registered-model-id: '1'
    networking.kserve.io/visibility: exposed
    opendatahub.io/dashboard: 'true'
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: RollingUpdate
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ''
      resources:
        limits:
          cpu: '2'
          memory: 4Gi
          nvidia.com/gpu: '1'
        requests:
          cpu: '2'
          memory: 4Gi
          nvidia.com/gpu: '1'
      runtime: bielik-v30
      storage:
        key: nieruchomosci
        path: huggingface/speakleash/Bielik-11B-v3.0-Instruct/
    nodeSelector:
      workload.ai/gpu: 'true'
    serviceAccountName: nieruchomosci-sa
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: 'true'